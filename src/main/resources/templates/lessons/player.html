<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${lesson.title + ' - Player'}">Lesson Player</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
        /* ===================================================
           K-LEARN LESSON PLAYER REFRESH
        =================================================== */
        :root {
            --blue-soft: #eff6ff;
            --blue-deep: #2563eb;
            --pink-accent: #be185d;
            --shadow-sm: 0 4px 12px rgba(0,0,0,0.05);
            --shadow-md: 0 10px 25px rgba(0,0,0,0.08);
            --r-xl: 24px;
            --r-lg: 18px;
        }

        #page-lesson-player {
            padding: 40px 20px 80px;
            max-width: 1000px;
            margin: auto;
            font-family: 'Pretendard', system-ui, sans-serif;
        }

        .section-title {
            font-size: 1.5rem;
            font-weight: 800;
            margin-bottom: 24px;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-title::before {
            content: '';
            width: 4px;
            height: 24px;
            background: var(--blue-deep);
            border-radius: 10px;
        }

        /* ================= THEORY CONTENT (The "Book" Feel) ================= */
        .theory-content {
            background: #ffffff;
            padding: 40px;
            border-radius: var(--r-xl);
            line-height: 1.8;
            font-size: 17px;
            color: #334155;
            border: 1px solid #e2e8f0;
            box-shadow: var(--shadow-sm);
            margin-bottom: 50px;
            position: relative;
            overflow: hidden;
        }

        /* Trang trí một chút cho giống trang sách */
        .theory-content::after {
            content: '📚 Theory';
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            opacity: 0.3;
        }

        /* Định dạng nội dung Markdown */
        .theory-content h1, .theory-content h2, .theory-content h3 {
            color: var(--blue-deep);
            font-weight: 800;
            margin-top: 30px;
            margin-bottom: 15px;
        }

        .theory-content h3 { font-size: 22px; border-left: 4px solid var(--blue-deep); padding-left: 15px; }

        .theory-content strong {
            color: var(--pink-accent);
            background: #fff1f2;
            padding: 2px 6px;
            border-radius: 6px;
        }

        .theory-content code {
            font-family: 'Consolas', monospace;
            background: #f1f5f9;
            padding: 4px 8px;
            border-radius: 6px;
            color: #475569;
            font-size: 0.9em;
        }

        .theory-content blockquote {
            border-left: 5px solid #cbd5e1;
            margin: 20px 0;
            padding: 10px 20px;
            background: #f8fafc;
            color: #64748b;
            font-style: italic;
        }

        /* ================= SKILL GRID (Interactive Cards) ================= */
        .skill-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-top: 25px;
        }

        .skill-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: white;
            border: 2px solid #f1f5f9;
            border-radius: var(--r-lg);
            padding: 30px 20px;
            text-decoration: none;
            color: var(--text-primary);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: var(--shadow-sm);
        }

        .skill-card span { font-size: 40px; margin-bottom: 15px; }
        .skill-card h3 { font-size: 18px; font-weight: 800; margin-bottom: 5px; }
        .skill-card p { font-size: 13px; color: var(--text-muted); margin: 0; text-align: center; }

        .skill-card:hover {
            transform: translateY(-8px);
            box-shadow: var(--shadow-md);
            border-color: var(--blue-deep);
        }

        /* Màu sắc đặc trưng cho từng kỹ năng khi hover */
        .skill-card.listening:hover { background: #eff6ff; }
        .skill-card.speaking:hover  { background: #ecfdf5; border-color: #10b981; }
        .skill-card.reading:hover   { background: #fffbeb; border-color: #f59e0b; }
        .skill-card.writing:hover   { background: #fef2f2; border-color: #ef4444; }

        /* ================= BUTTONS ================= */
        .review-box { margin-top: 50px; text-align: center; }

        .review-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 18px 45px;
            background: var(--blue-deep);
            color: white;
            font-weight: 800;
            font-size: 16px;
            border-radius: 50px;
            text-decoration: none;
            transition: all 0.3s;
            box-shadow: 0 10px 20px rgba(37, 99, 235, 0.2);
        }

        .review-btn:hover {
            transform: scale(1.05);
            background: #1d4ed8;
            box-shadow: 0 15px 30px rgba(37, 99, 235, 0.3);
        }

        [data-theme="dark"] .theory-content {
            background: #1e293b;
            color: #e2e8f0;
            border-color: #334155;
        }
    </style>
</head>

<body>
<div layout:fragment="content">
    <section class="page active" id="page-lesson-player">

        <div class="page-header" style="margin-bottom: 40px;">
            <div>
                <h2 class="page-title" style="font-size: 2.2rem; font-weight: 900; letter-spacing: -1px;" th:text="${lesson.title}">Lesson</h2>
                <div style="display:flex; align-items:center; gap:10px; margin-top:5px;">
                    <span style="background: var(--blue-deep); color:white; padding: 2px 10px; border-radius: 20px; font-size: 11px; font-weight: 700;">LEVEL 1</span>
                    <p class="page-subtitle" style="margin:0;">Lý thuyết và luyện tập</p>
                </div>
            </div>
        </div>

        <section>
            <h2 class="section-title">Lý thuyết Theory</h2>

            <div th:if="${theory != null}">
                <textarea id="markdown-raw" th:text="${theory.content}" style="display:none;"></textarea>
                <div id="theory-display" class="theory-content">
                    <div style="text-align: center; padding: 20px;">Đang chuẩn bị bài học...</div>
                </div>
            </div>

            <div th:if="${theory == null}">
                <div class="theory-content" style="text-align: center; opacity: 0.6;">
                    🌵 Chưa có nội dung lý thuyết cho bài học này.
                </div>
            </div>
        </section>

        <section class="lesson-exercise-section">
            <h2 class="section-title">Luyện tập Practice</h2>

            <div class="skill-grid">
                <a th:href="@{'/lessons/' + ${lesson.lessonId} + '/listening'}" class="skill-card listening">
                    <span>🎧</span>
                    <h3>Listening</h3>
                    <p>Nghe và hiểu</p>
                </a>

                <a th:href="@{'/lessons/' + ${lesson.lessonId} + '/speaking'}" class="skill-card speaking">
                    <span>🎤</span>
                    <h3>Speaking</h3>
                    <p>Luyện phát âm</p>
                </a>

                <a th:href="@{'/lessons/' + ${lesson.lessonId} + '/reading'}" class="skill-card reading">
                    <span>📖</span>
                    <h3>Reading</h3>
                    <p>Đọc hiểu văn bản</p>
                </a>

                <a th:href="@{'/lessons/' + ${lesson.lessonId} + '/writing'}" class="skill-card writing">
                    <span>✍️</span>
                    <h3>Writing</h3>
                    <p>Viết câu chuẩn chỉnh</p>
                </a>
            </div>

            <div class="review-box">
                <a th:href="@{'/lessons/' + ${lesson.lessonId} + '/review'}" class="review-btn">
                    🔄 Ôn tập lại bài học
                </a>
            </div>
        </section>
    </section>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/4.3.0/marked.min.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const rawEl = document.getElementById("markdown-raw");
            const displayEl = document.getElementById("theory-display");

            if (rawEl && displayEl) {
                try {
                    const content = rawEl.value;
                    marked.setOptions({
                        breaks: true,
                        gfm: true,
                        headerIds: false,
                        mangle: false
                    });
                    displayEl.innerHTML = marked.parse(content);
                } catch (error) {
                    console.error("Lỗi render Markdown:", error);
                    displayEl.innerHTML = rawEl.value;
                }
            }
        });
    </script>
</div>
</body>
</html>
