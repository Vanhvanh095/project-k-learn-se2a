<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head><title>Luyện Nói — K-Learn</title>
    <style>
        /* ═══════════════════════════════════════════════════
           K-LEARN SPEAKING REFRESH
        ═══════════════════════════════════════════════════ */
        :root {
            --speaking-primary: #10b981; /* Màu xanh lá năng động */
            --speaking-bg: #f0fdf4;
            --speaking-shadow: 0 15px 35px rgba(16, 185, 129, 0.15);
        }

        #page-speaking {
            max-width: 800px;
            margin: auto;
            padding: 40px 20px;
            font-family: 'Pretendard', system-ui, sans-serif;
        }

        /* ── PROMPT CARD ── */
        .speaking-prompt {
            background: white;
            border-radius: 30px;
            padding: 45px 30px;
            text-align: center;
            border: 2px solid #f1f5f9;
            box-shadow: 0 10px 25px rgba(0,0,0,0.03);
            margin-bottom: 40px;
            position: relative;
        }

        .speaking-label {
            font-size: 14px;
            font-weight: 700;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 20px;
        }

        .speaking-text-kr {
            font-family: 'Noto Serif KR', serif;
            font-size: 42px;
            font-weight: 900;
            color: #1e293b;
            margin-bottom: 10px;
        }

        .speaking-text-roman {
            font-size: 18px;
            color: var(--speaking-primary);
            font-weight: 600;
            margin-bottom: 5px;
            opacity: 0.8;
        }

        .speaking-text-vi {
            font-size: 16px;
            color: #64748b;
            font-style: italic;
        }

        .btn-speak {
            margin-top: 25px;
            width: 54px;
            height: 54px;
            border-radius: 50%;
            border: none;
            background: #f1f5f9;
            color: #475569;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-speak:hover {
            background: #e2e8f0;
            transform: scale(1.1);
        }

        /* ── RECORDER SECTION ── */
        .speaking-recorder {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
        }

        .btn-record {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: none;
            background: var(--speaking-primary);
            color: white;
            font-size: 32px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 25px rgba(16, 185, 129, 0.3);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
        }

        .btn-record:hover { transform: scale(1.05); }
        .btn-record.recording {
            background: #ef4444;
            box-shadow: 0 0 0 15px rgba(239, 68, 68, 0.1);
            animation: pulse-red 1.5s infinite;
        }

        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); }
            70% { box-shadow: 0 0 0 20px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }

        #recordText {
            font-weight: 800;
            color: #475569;
            font-size: 15px;
        }

        /* ── RESULT & SCORE ── */
        .speaking-result {
            background: #f8fafc;
            border-radius: 20px;
            padding: 25px;
            width: 100%;
            text-align: center;
            border: 1px dashed #cbd5e1;
            animation: slideUp 0.4s ease;
        }

        @keyframes slideUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }

        .speaking-result-text {
            font-size: 24px;
            font-weight: 800;
            color: #1e293b;
            margin: 10px 0;
        }

        .speaking-score {
            display: inline-block;
            padding: 8px 20px;
            border-radius: 50px;
            font-weight: 900;
            font-size: 20px;
            color: white;
            background: var(--speaking-primary);
        }

        /* ── ACTIONS ── */
        .exercise-actions {
            margin-top: 50px;
            text-align: center;
        }

        .btn-secondary {
            background: white;
            border: 2px solid #e2e8f0;
            padding: 14px 35px;
            border-radius: 15px;
            font-weight: 700;
            color: #64748b;
            transition: 0.2s;
        }

        .btn-secondary:hover {
            border-color: var(--speaking-primary);
            color: var(--speaking-primary);
        }
    </style></head>
<body th:attr="data-lesson-id=${lesson.lessonId}">
<div layout:fragment="content">
<section class="page active" id="page-speaking">
    <div class="page-header">
        <div>
            <h2 class="page-title">Luyện Nói 말하기</h2>
            <p class="page-subtitle">Luyện phát âm tiếng Hàn</p>
        </div>
    </div>
    <div class="exercise-container">
        <div class="speaking-prompt">
            <p class="speaking-label">Hãy nói lại câu sau:</p>
            <div class="speaking-text-kr" id="speakingTextKr">안녕하세요</div>
            <div class="speaking-text-roman" id="speakingTextRoman">annyeonghaseyo</div>
            <div class="speaking-text-vi" id="speakingTextVi">Xin chào</div>
            <button class="btn-speak" onclick="speakKorean(document.getElementById('speakingTextKr').textContent)" aria-label="Nghe mẫu">🔊</button>
        </div>
        <div class="speaking-recorder">
            <button class="btn-record" id="recordBtn" onclick="toggleRecording()">
                <span class="record-icon" id="recordIcon">🎤</span>
                <span id="recordText">Nhấn để ghi âm</span>
            </button>
            <div class="recording-indicator" id="recordingIndicator" style="display:none;">
                <div class="pulse-dot"></div><span>Đang ghi âm...</span>
            </div>
            <div class="speaking-result" id="speakingResult" style="display:none;">
                <p class="speaking-result-label">Bạn đã nói:</p>
                <p class="speaking-result-text" id="speakingResultText"></p>
                <div class="speaking-score" id="speakingScore"></div>
            </div>
        </div>
        <div class="exercise-actions">
            <button class="btn btn-secondary" onclick="nextSpeakingPrompt()">Câu khác →</button>
        </div>
    </div>
</section>
</div>
</body>
</html>
