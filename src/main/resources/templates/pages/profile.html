<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Hồ sơ - K-Learn</title>
</head>
<body>
<div layout:fragment="content">
    <div class="page-header">
        <h1> Hồ sơ của tôi</h1>
        <p>Quản lý thông tin cá nhân và thành tích</p>
    </div>

    <div class="profile-container">
        <!-- User Info Card -->
        <div class="profile-card">
            <div class="profile-header">
                <div class="profile-avatar" th:text="${user != null ? user.name.substring(0,1).toUpperCase() : 'U'}">U</div>
                <div class="profile-info">
                    <h2 th:text="${user != null ? user.name : 'Học viên'}">Học viên</h2>
                    <p th:text="${user != null ? user.email : ''}">email@example.com</p>
                    <div class="profile-stats">
                        <span class="stat">🎓 Cấp <span th:text="${user != null ? user.currentLevel : 1}">1</span></span>
                        <span class="stat">⭐ <span th:text="${user != null ? user.totalXp : 0}">0</span> XP</span>
                        <span class="stat">🔥 <span th:text="${user != null ? user.streakCount : 0}">0</span> ngày</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Badges Section -->
        <div class="badges-section">
            <h3>🏅 Huy hiệu của tôi</h3>
            <div class="badges-grid" id="badgesGrid">
                <!-- Badges will be loaded via JavaScript -->
                <div class="loading-placeholder">Đang tải huy hiệu...</div>
            </div>
        </div>

        <!-- Settings Section -->
        <div class="settings-section">
            <h3>⚙️ Cài đặt</h3>
            <div class="setting-item">
                <label>Chủ đề giao diện</label>
                <select id="themeSelect" onchange="updateTheme(this.value)">
                    <option value="light">Sáng</option>
                    <option value="dark">Tối</option>
                </select>
            </div>
        </div>
    </div>

    <style>
        .profile-container {
            display: grid;
            gap: 32px;
            margin-top: 32px;
        }

        .profile-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 32px;
        }

        .profile-header {
            display: flex;
            align-items: center;
            gap: 24px;
        }

        .profile-avatar {
            width: 80px;
            height: 80px;
            background: var(--gradient-primary);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: bold;
        }

        .profile-info h2 {
            margin: 0 0 8px 0;
            color: var(--text-primary);
        }

        .profile-info p {
            margin: 0 0 16px 0;
            color: var(--text-secondary);
        }

        .profile-stats {
            display: flex;
            gap: 24px;
        }

        .stat {
            background: var(--bg-secondary);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
        }

        .badges-section, .settings-section {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 24px;
        }

        .badges-section h3, .settings-section h3 {
            margin: 0 0 20px 0;
            color: var(--text-primary);
        }

        .badges-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 16px;
        }

        .badge-item {
            text-align: center;
            padding: 16px;
            border-radius: 8px;
            background: var(--bg-secondary);
            transition: transform 0.2s;
        }

        .badge-item.earned {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .badge-item.earned:hover {
            transform: scale(1.05);
        }

        .badge-item.not-earned {
            opacity: 0.4;
            filter: grayscale(100%);
        }

        .badge-icon {
            font-size: 32px;
            margin-bottom: 8px;
        }

        .badge-name {
            font-size: 12px;
            font-weight: 600;
        }

        .setting-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 0;
            border-bottom: 1px solid var(--border-color);
        }

        .setting-item:last-child {
            border-bottom: none;
        }

        .setting-item label {
            font-weight: 600;
            color: var(--text-primary);
        }

        .setting-item select {
            padding: 8px 12px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            background: var(--bg-primary);
            color: var(--text-primary);
        }

        .loading-placeholder {
            text-align: center;
            color: var(--text-secondary);
            padding: 40px;
        }
    </style>

    <script th:inline="javascript">
        // Load user badges
        document.addEventListener('DOMContentLoaded', () => {
            fetch('/api/users/me/badges')
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        renderBadges(data.data);
                    }
                })
                .catch(error => {
                    console.error('Failed to load badges:', error);
                });

            // Set current theme
            const currentTheme = /*[[${user != null ? user.theme : 'light'}]]*/ 'light';
            document.getElementById('themeSelect').value = currentTheme;
        });

        function renderBadges(badges) {
            const grid = document.getElementById('badgesGrid');
            
            // Define all possible badges (this should match the database)
            const allBadges = [
                { id: 1, name: 'First Step', icon: '👟', condition: 'Hoàn thành lesson đầu tiên' },
                { id: 2, name: 'Lesson x5', icon: '📚', condition: 'Hoàn thành 5 lessons' },
                { id: 3, name: 'Lesson x10', icon: '🎓', condition: 'Hoàn thành 10 lessons' },
                { id: 4, name: 'Course Complete', icon: '🏆', condition: 'Hoàn thành 1 course' },
                { id: 5, name: 'Getting Started', icon: '🔥', condition: 'Streak 3 ngày' },
                { id: 6, name: 'Week Warrior', icon: '💪', condition: 'Streak 7 ngày' },
                { id: 7, name: 'Dedicated Learner', icon: '⭐', condition: 'Streak 30 ngày' },
                { id: 8, name: 'XP Rookie', icon: '🌟', condition: 'Đạt 100 XP' },
                { id: 9, name: 'XP Pro', icon: '💎', condition: 'Đạt 500 XP' },
                { id: 10, name: 'Perfect Speaker', icon: '🎤', condition: 'Speaking score 100%' }
            ];

            const earnedBadgeIds = badges.map(b => b.badgeId);
            
            grid.innerHTML = allBadges.map(badge => {
                const earned = earnedBadgeIds.includes(badge.id);
                return `
                    <div class="badge-item ${earned ? 'earned' : 'not-earned'}" title="${badge.condition}">
                        <div class="badge-icon">${badge.icon}</div>
                        <div class="badge-name">${badge.name}</div>
                    </div>
                `;
            }).join('');
        }

        function updateTheme(theme) {
            // This will be handled by the global dark-mode.js
            if (window.toggleDarkMode) {
                const current = document.documentElement.getAttribute('data-theme');
                if ((current === 'dark' && theme === 'light') || 
                    (current === 'light' && theme === 'dark')) {
                    window.toggleDarkMode();
                }
            }
        }
    </script>
</div>
</body>
</html>
