<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head><title>Luyện Nghe — K-Learn</title></head>
<body>
<div layout:fragment="content">
    <section class="page active" id="page-listening">

        <div class="page-header">
            <div>
                <h2 class="page-title">
                    Luyện Nghe
                    <span class="title-kr-badge">듣기</span>
                </h2>
                <p class="page-subtitle">Nghe và chọn đáp án đúng</p>
            </div>
            <span class="skill-badge">🎧 듣기 연습</span>
        </div>

        <div class="exercise-container">

            <div class="exercise-progress">
                <div class="progress-label">
                    <span id="listeningProgress">Câu 1/5</span>
                    <span class="progress-pct" id="listeningProgressPct">20%</span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" id="listeningProgressBar" style="width:20%"></div>
                </div>
            </div>

            <div class="listening-card">
                <button class="btn-listen-big" id="listeningPlayBtn" onclick="playListeningAudio()">
        <span class="listen-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round" width="36" height="36">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
            <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
            <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
          </svg>
        </span>
                </button>
                <div class="playing-label">
                    <div class="wave-bars">
                        <span></span><span></span><span></span><span></span><span></span>
                    </div>
                    Đang phát...
                </div>
                <p class="listening-hint" id="listeningHint">Nghe câu và chọn nghĩa đúng</p>
            </div>

            <div class="answer-options" id="listeningAnswers"></div>

            <div class="exercise-result" id="listeningResult" style="display:none;">

                <div class="result-text" id="listeningResultText">Chính xác!</div>
                <div class="result-explanation" id="listeningResultExplanation"></div>
            </div>

            <div class="exercise-actions">
                <button class="btn btn-primary" id="listeningNextBtn"
                        onclick="nextListeningQuestion()" style="display:none;">Câu tiếp theo →</button>
            </div>

        </div>
    </section>
</div>
</body>
</html>
